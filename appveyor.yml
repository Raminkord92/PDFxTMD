version: '{build}'

image:
  - Visual Studio 2019
  - Ubuntu2204
  - macOS

configuration:
  - Release

for:
  - matrix:
      only:
        - image: Visual Studio 2019
    environment:
      ARCH: x64
    before_build:
      - cmake -G "Visual Studio 16 2019" -A %ARCH% -B build
    build_script:
      - cmake --build build --config %CONFIGURATION%

  - matrix:
      only:
        - image: Visual Studio 2019
    environment:
      ARCH: ARM64
    before_build:
      - cmake -G "Visual Studio 16 2019" -A %ARCH% -B build
    build_script:
      - cmake --build build --config %CONFIGURATION%

  - matrix:
      only:
        - image: Ubuntu2204
    before_build:
      - sh: cmake -DCMAKE_BUILD_TYPE=$CONFIGURATION -B build
    build_script:
      - sh: cmake --build build

  - matrix:
      only:
        - image: macOS
    before_build:
      - sh: cmake -DCMAKE_BUILD_TYPE=$CONFIGURATION -B build
    build_script:
      - sh: cmake --build build